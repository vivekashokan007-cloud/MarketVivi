<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121218">
    <title>Market Radar v2</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- ═══ HEADER ═══ -->
    <header class="app-header">
        <div class="header-left">
            <h1>Market Radar</h1>
            <span class="version">v2.0 — Premium First</span>
        </div>
        <div class="header-right">
            <span id="watch-status" class="watch-badge">⏹ Ready</span>
        </div>
    </header>

    <main>
        <!-- ═══ TOKEN (collapsed by default) ═══ -->
        <details class="section token-section">
            <summary>🔑 Upstox Token</summary>
            <div class="token-form">
                <input type="text" id="in-token" class="input-field" placeholder="Paste Upstox access token">
                <button id="btn-save-token" class="btn-sm">Save</button>
            </div>
        </details>

        <!-- ═══ MORNING INPUT ═══ -->
        <section class="section morning-section">
            <h2>☀️ Morning Data</h2>
            <div class="input-grid">
                <div class="input-group">
                    <label>FII Cash (₹Cr)</label>
                    <input type="number" id="in-fii-cash" class="input-field morning-input" placeholder="-1200">
                </div>
                <div class="input-group">
                    <label>FII Short %</label>
                    <input type="number" id="in-fii-short" class="input-field morning-input" placeholder="88" step="0.1">
                </div>
                <div class="input-group">
                    <label>Close Char</label>
                    <input type="number" id="in-close-char" class="input-field morning-input" placeholder="-2" step="1">
                </div>
                <div class="input-group">
                    <label>Upstox Bias</label>
                    <select id="in-upstox-bias" class="input-field morning-input">
                        <option value="Neutral">Neutral</option>
                        <option value="Bullish">Bullish</option>
                        <option value="Bearish">Bearish</option>
                    </select>
                </div>
            </div>
            <div class="morning-actions">
                <button id="btn-lock" class="btn-primary">🔒 Lock & Scan</button>
                <button id="btn-rescan" class="btn-ghost">↻ Reset</button>
                <button id="btn-stop" class="btn-ghost" style="display:none">⏹ Stop</button>
            </div>
            <div id="status" class="status-text"></div>
        </section>

        <!-- ═══ PREMIUM ENVIRONMENT ═══ -->
        <section class="section" id="premium-section">
            <h2>📊 Premium Environment</h2>
            <div id="premium-env">
                <div class="empty-state">Enter morning data and scan to see premium environment</div>
            </div>
        </section>

        <!-- ═══ WATCHLIST ═══ -->
        <section class="section" id="watchlist-section">
            <h2>🎯 Watchlist</h2>
            <div id="watchlist">
                <div class="empty-state">Candidates will appear after scan</div>
            </div>
        </section>

        <!-- ═══ OPEN POSITION ═══ -->
        <section class="section" id="position" style="display:none"></section>

        <!-- ═══ NOTIFICATION LOG ═══ -->
        <section class="section">
            <h2>🔔 Notifications</h2>
            <div id="notif-log">
                <div class="empty-state">Notifications will appear here during watch mode</div>
            </div>
        </section>

        <!-- ═══ FOOTER ═══ -->
        <footer class="app-footer">
            <span id="footer-status">Ready</span>
        </footer>
    </main>

    <!-- Scripts: order matters -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="bs.js?v=2"></script>
    <script src="db.js?v=2"></script>
    <script src="api.js?v=2"></script>
    <script src="app.js?v=2"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
